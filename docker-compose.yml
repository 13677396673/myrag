# ═══════════════════════════════════════════════════════════
# MyRAG — Docker Compose
# ═══════════════════════════════════════════════════════════
# 一键启动：docker-compose up -d
# 访问：http://localhost (前端) / http://localhost:8000/docs (API)

version: "3.8"

networks:
  myrag-net:
    driver: bridge

volumes:
  myrag-data:      # SQLite / 上传文件 / ChromaDB
    driver: local

services:
  # ── 后端 API ────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: myrag-backend
    ports:
      - "8000:8000"
    volumes:
      - myrag-data:/app/data
    env_file:
      - .env
    environment:
      - APP_DEBUG=false
      - SERVER_CORS_ORIGINS=["http://localhost"]
    networks:
      - myrag-net
    restart: unless-stopped

  # ── 前端 (Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: myrag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - myrag-net
    restart: unless-stopped

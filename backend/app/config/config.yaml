# =============================================================================
# MyRAG 应用默认配置
# 优先级：环境变量 > .env > 此文件 > Settings 类默认值
# =============================================================================

# ── 应用基础配置 ──
APP_NAME: "myrag"
APP_VERSION: "0.1.0"
APP_DEBUG: true

# ── 服务配置 ──
SERVER_HOST: "0.0.0.0"
SERVER_PORT: 8000
SERVER_CORS_ORIGINS:
  - "http://localhost:5173"

# ── 数据库配置 ──
DATABASE_URL: "sqlite+aiosqlite:///./data/myrag.db"
DATABASE_ECHO: false

# ── JWT 配置 ──
JWT_SECRET_KEY: "change-me-in-production"
JWT_ALGORITHM: "HS256"
JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 1440  # 24 小时

# ── 文件存储配置 ──
STORAGE_BACKEND: "local"          # local | s3 | minio
STORAGE_LOCAL_PATH: "./data/uploads"
STORAGE_MAX_FILE_SIZE: 52428800   # 50MB
# S3/MinIO 可选配置
STORAGE_S3_ENDPOINT: null
STORAGE_S3_ACCESS_KEY: null
STORAGE_S3_SECRET_KEY: null
STORAGE_S3_BUCKET: null

# ── 任务队列配置 ──
TASK_QUEUE_BACKEND: "huey"        # huey | celery | arq
TASK_QUEUE_REDIS_URL: null

# ── LLM 配置 ──
LLM_BACKEND: "deepseek"           # deepseek | openai | ollama
# DeepSeek
DEEPSEEK_API_KEY: null
DEEPSEEK_MODEL: "deepseek-chat"
DEEPSEEK_BASE_URL: "https://api.deepseek.com"
# OpenAI
OPENAI_API_KEY: null
OPENAI_MODEL: "gpt-4o-mini"
OPENAI_BASE_URL: "https://api.openai.com/v1"
# Ollama
OLLAMA_BASE_URL: "http://localhost:11434"
OLLAMA_MODEL: "qwen2.5:3b"

# ── Embedding 配置 ──
EMBEDDING_BACKEND: "bge-small"    # bge-small | openai | deepseek
EMBEDDING_BGE_MODEL: "BAAI/bge-small-zh-v1.5"
EMBEDDING_BGE_DEVICE: "cpu"
EMBEDDING_OPENAI_MODEL: "text-embedding-3-small"
EMBEDDING_DEEPSEEK_MODEL: "deepseek-embedding"

# ── 向量数据库配置 ──
VECTOR_STORE_BACKEND: "chromadb"  # chromadb | faiss | milvus | pgvector
VECTOR_STORE_CHROMA_PATH: "./data/chromadb"
VECTOR_STORE_MILVUS_HOST: "localhost"
VECTOR_STORE_MILVUS_PORT: 19530
VECTOR_STORE_PGVECTOR_CONNECTION: null

# ── 检索配置 ──
RETRIEVAL_TOP_K: 5
RETRIEVAL_SIMILARITY_THRESHOLD: 0.0
RETRIEVAL_MODE: "vector"          # vector | hybrid
RETRIEVAL_RERANK_ENABLED: false

# ── 切片配置 ──
SPLITTER_TYPE: "fixed"            # fixed | markdown | semantic
SPLITTER_CHUNK_SIZE: 512
SPLITTER_CHUNK_OVERLAP: 64

# ── LLM 生成配置 ──
LLM_TEMPERATURE: 0.7
LLM_MAX_TOKENS: 2048
